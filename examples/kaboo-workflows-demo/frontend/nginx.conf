server {
    listen 3000;

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/copilotkit/ {
        proxy_pass http://backend:4000/api/copilotkit/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
    }
}
