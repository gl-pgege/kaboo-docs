services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: market_research
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d market_research"]
      interval: 5s
      timeout: 3s
      retries: 5

  pipeline-service:
    build:
      context: ./pipeline-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      DATABASE_URL: postgresql://demo:demo@postgres:5432/market_research
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PIPELINE_SERVICE_URL: http://pipeline-service:8080/invocations
      PORT: 4000
    depends_on:
      - pipeline-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
